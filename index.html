<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Live Location Tracker</title>
    <style>
        /* Same styles as before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .status-icon { font-size: 40px; margin-bottom: 10px; }
        .status-text { color: #333; font-size: 16px; font-weight: 500; }
        .status-detail {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
            white-space: pre-line;
        }
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn-danger { background: #e53e3e; }
        .btn-danger:hover { background: #c53030; }
        .btn-secondary { background: #e2e8f0; color: #333; }
        .hidden { display: none !important; }
        .success { background: #d4edda; border: 2px solid #28a745; }
        .error { background: #f8d7da; border: 2px solid #dc3545; }
        .info { background: #d1ecf1; border: 2px solid #17a2b8; }
        .warning { background: #fff3cd; border: 2px solid #ffc107; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
        .timer {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            margin: 5px 0;
        }
        .driver-id {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔄</div>
        <h1>Live Location Tracker</h1>
        <p class="subtitle">Your location will be shared every 2 hours</p>
        
        <div id="driverInfo" class="driver-id hidden">Driver: <span id="driverIdDisplay"></span></div>
        
        <div class="status-box" id="statusBox">
            <div class="status-icon" id="statusIcon">📍</div>
            <div class="status-text" id="statusText">Starting tracker...</div>
            <div class="loading" id="loadingSpinner"></div>
            <div class="status-detail" id="statusDetail"></div>
        </div>

        <div id="trackingControls">
            <button class="btn" id="startBtn">▶️ Start Tracking</button>
            <button class="btn btn-danger hidden" id="stopBtn">⏹️ Stop Tracking</button>
        </div>
        
        <div class="footer">
            <span id="timestamp"></span><br>
            <span id="nextUpdate" class="timer">Next update: --</span>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const WEBHOOK_URL = "https://YOUR-BACKEND.onrender.com/api/location";
        const TRACKING_INTERVAL = 2 * 60 * 60 * 1000; // 2 hours in milliseconds
        // =========================

        // Get driver ID
        const urlParams = new URLSearchParams(window.location.search);
        const driverId = urlParams.get('id') || urlParams.get('driver') || 'unknown';
        
        // DOM elements
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusDetail = document.getElementById('statusDetail');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const driverIdDisplay = document.getElementById('driverIdDisplay');
        const driverInfo = document.getElementById('driverInfo');
        const timestamp = document.getElementById('timestamp');
        const nextUpdate = document.getElementById('nextUpdate');

        let watchId = null;
        let intervalId = null;
        let lastLocation = null;
        let isTracking = false;
        let updateCount = 0;

        // Show driver ID
        if (driverId !== 'unknown') {
            driverIdDisplay.textContent = driverId;
            driverInfo.classList.remove('hidden');
        }

        timestamp.textContent = '🕐 Started: ' + new Date().toLocaleString();

        function updateStatus(icon, text, detail, type = 'info') {
            statusIcon.textContent = icon;
            statusText.textContent = text;
            statusDetail.textContent = detail || '';
            loadingSpinner.classList.add('hidden');
            statusBox.classList.remove('success', 'error', 'info', 'warning');
            statusBox.classList.add(type);
        }

        function showLoading(text = 'Getting location...') {
            statusIcon.textContent = '📍';
            statusText.textContent = text;
            statusDetail.textContent = '';
            loadingSpinner.classList.remove('hidden');
            statusBox.classList.remove('success', 'error', 'info', 'warning');
        }

        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            
            const data = {
                driverId: driverId,
                latitude: lat,
                longitude: lng,
                accuracy: accuracy,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                updateNumber: ++updateCount,
                source: 'periodic-tracking'
            };
            
            console.log(`📍 Update #${updateCount}:`, data);
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                console.log('✅ Location saved:', result);
                lastLocation = { lat, lng };
                updateStatus(
                    '✅',
                    `Location #${updateCount} sent!`,
                    `📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}\n🎯 Accuracy: ${Math.round(accuracy)}m`,
                    'success'
                );
            })
            .catch(error => {
                console.error('❌ Error:', error);
                updateStatus(
                    '⚠️',
                    `Update #${updateCount} failed`,
                    'Will retry in 2 hours',
                    'error'
                );
            });
        }

        function getLocation() {
            if (!navigator.geolocation) {
                updateStatus('❌', 'Location not supported', 'Please use a modern browser', 'error');
                return;
            }

            showLoading('Getting your location...');
            
            const options = {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendLocation(position);
                    // Calculate next update time
                    const nextTime = new Date(Date.now() + TRACKING_INTERVAL);
                    nextUpdate.textContent = `Next update: ${nextTime.toLocaleTimeString()}`;
                },
                (error) => {
                    console.error('Geolocation error:', error);
                    updateStatus(
                        '🔒',
                        'Location access required',
                        'Please allow location access and try again',
                        'error'
                    );
                    stopTracking();
                },
                options
            );
        }

        function startTracking() {
            if (isTracking) return;
            
            // First location immediately
            getLocation();
            
            // Then every 2 hours
            intervalId = setInterval(() => {
                console.log('⏰ 2 hours passed, getting location...');
                getLocation();
            }, TRACKING_INTERVAL);
            
            isTracking = true;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            
            updateStatus(
                '🔄',
                'Tracking started!',
                `Location will be sent every 2 hours\nDriver: ${driverId}`,
                'info'
            );
        }

        function stopTracking() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            isTracking = false;
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            
            updateStatus(
                '⏹️',
                'Tracking stopped',
                `Total updates: ${updateCount}`,
                'warning'
            );
        }

        // Event listeners
        startBtn.addEventListener('click', startTracking);
        stopBtn.addEventListener('click', stopTracking);

        // Auto-start? (Uncomment if you want it to start automatically)
        // window.addEventListener('load', () => {
        //     setTimeout(startTracking, 1000);
        // });
    </script>
</body>
</html>
