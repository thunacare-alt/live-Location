<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📍 Share Delivery Location</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 10px;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .status-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .status-text {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        .status-detail {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
            word-break: break-all;
        }
        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        .hidden {
            display: none !important;
        }
        .success {
            background: #d4edda;
            border: 2px solid #28a745;
        }
        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
        }
        .info {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
        .driver-id {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚚</div>
        <h1>Share Location</h1>
        <p class="subtitle">One click to share your delivery location</p>
        
        <div id="driverInfo" class="driver-id hidden">Driver: <span id="driverIdDisplay"></span></div>
        
        <div class="status-box" id="statusBox">
            <div class="status-icon" id="statusIcon">📍</div>
            <div class="status-text" id="statusText">Getting your location...</div>
            <div class="loading" id="loadingSpinner"></div>
            <div class="status-detail" id="statusDetail"></div>
        </div>

        <button class="btn btn-secondary" id="retryBtn" style="display:none;">🔄 Try Again</button>
        <button class="btn" id="manualBtn" style="display:none;">📱 Share Manually</button>
        
        <div class="footer">
            <span id="timestamp"></span>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION - CHANGE THESE =====
        const WEBHOOK_URL = "https://your-backend.com/api/location"; // ← CHANGE THIS
        // ======================================
        
        // Get driver ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const driverId = urlParams.get('id') || urlParams.get('driver') || 'unknown';
        
        // DOM elements
        const statusBox = document.getElementById('statusBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const statusDetail = document.getElementById('statusDetail');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const retryBtn = document.getElementById('retryBtn');
        const manualBtn = document.getElementById('manualBtn');
        const driverIdDisplay = document.getElementById('driverIdDisplay');
        const driverInfo = document.getElementById('driverInfo');
        const timestamp = document.getElementById('timestamp');
        
        // Show driver ID
        if (driverId !== 'unknown') {
            driverIdDisplay.textContent = driverId;
            driverInfo.classList.remove('hidden');
        }
        
        // Set timestamp
        timestamp.textContent = '🕐 ' + new Date().toLocaleString();
        
        // Update status function
        function updateStatus(icon, text, detail, type = 'info') {
            statusIcon.textContent = icon;
            statusText.textContent = text;
            statusDetail.textContent = detail || '';
            loadingSpinner.classList.add('hidden');
            
            // Reset classes
            statusBox.classList.remove('success', 'error', 'info');
            statusBox.classList.add(type);
        }
        
        // Show loading
        function showLoading(text = 'Getting your location...') {
            statusIcon.textContent = '📍';
            statusText.textContent = text;
            statusDetail.textContent = '';
            loadingSpinner.classList.remove('hidden');
            statusBox.classList.remove('success', 'error', 'info');
        }
        
        // Send location to backend
        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            
            const data = {
                driverId: driverId,
                latitude: lat,
                longitude: lng,
                accuracy: accuracy,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                source: 'one-click-location'
            };
            
            console.log('Sending location:', data);
            
            // Send to your backend
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Server error: ' + response.status);
                }
                return response.json();
            })
            .then(result => {
                console.log('Success:', result);
                updateStatus(
                    '✅',
                    'Location sent successfully!',
                    `📍 ${lat.toFixed(6)}, ${lng.toFixed(6)}\n🎯 Accuracy: ${Math.round(accuracy)}m`,
                    'success'
                );
                retryBtn.style.display = 'none';
                manualBtn.style.display = 'none';
            })
            .catch(error => {
                console.error('Error:', error);
                updateStatus(
                    '⚠️',
                    'Could not send location',
                    'The server is not responding. Tap "Try Again" or "Share Manually"',
                    'error'
                );
                retryBtn.style.display = 'block';
                manualBtn.style.display = 'block';
            });
        }
        
        // Get location
        function getLocation() {
            showLoading('Getting your location...');
            retryBtn.style.display = 'none';
            manualBtn.style.display = 'none';
            
            if (!navigator.geolocation) {
                updateStatus(
                    '❌',
                    'Location not supported',
                    'Your browser does not support location sharing. Please use a modern browser.',
                    'error'
                );
                manualBtn.style.display = 'block';
                return;
            }
            
            // Options for better accuracy
            const options = {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            };
            
            navigator.geolocation.getCurrentPosition(
                // Success
                function(position) {
                    sendLocation(position);
                },
                // Error
                function(error) {
                    console.error('Geolocation error:', error);
                    let message = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = 'Please allow location access and refresh the page.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = 'Location unavailable. Please enable GPS and try again.';
                            break;
                        case error.TIMEOUT:
                            message = 'Location request timed out. Please try again.';
                            break;
                        default:
                            message = 'Unknown error. Please try again.';
                    }
                    updateStatus(
                        '🔒',
                        'Location access required',
                        message,
                        'error'
                    );
                    retryBtn.style.display = 'block';
                    manualBtn.style.display = 'block';
                },
                options
            );
        }
        
        // Try again
        retryBtn.addEventListener('click', function() {
            getLocation();
        });
        
        // Manual share (opens Google Maps)
        manualBtn.addEventListener('click', function() {
            window.open('https://www.google.com/maps?q=YOUR_CURRENT_LOCATION', '_blank');
            updateStatus(
                '📱',
                'Opening Google Maps...',
                'Share your location from the app',
                'info'
            );
        });
        
        // Start automatically on page load
        window.addEventListener('load', function() {
            // Small delay to ensure everything is ready
            setTimeout(getLocation, 500);
        });
    </script>
</body>
</html>
